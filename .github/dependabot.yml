version: 2
updates:
  # Root + all workspace packages (pnpm)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    groups:
      # Batch non-breaking minor/patch updates together
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Pin major versions manually
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    labels:
      - dependencies
    commit-message:
      prefix: chore

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
