name: Bug Report
description: Something is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click on …
        3. See error
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Environment
      placeholder: |
        - Browser / Node version
        - OS
        - Relevant env vars (never paste secrets)

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant error output or attach screenshots.
