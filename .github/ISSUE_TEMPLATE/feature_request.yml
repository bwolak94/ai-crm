name: Feature Request
description: Propose a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Client (UI)
        - Server (API)
        - AI / scoring
        - Pipeline / deals
        - Contacts
        - Analytics
        - Infrastructure / DevOps
        - Other
    validations:
      required: true
